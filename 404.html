<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 - ページが見つかりません｜16バナナtype診断</title>
<meta name="robots" content="noindex">
<style>:root{--sun:#FFC93C;--sun-deep:#F2A93B;--cream:#FFF5DB;--card:#FFFDF2;--ink:#42280E;
--muted:#8A6B43;--blush:#FF7A59;--chip:#F6E7C6;--shadow:#42280E;--dot:rgba(122,74,29,.14);}
@media (prefers-color-scheme:dark){:root{--cream:#221507;--card:#31220E;--ink:#FFEDC4;
--muted:#C7A66E;--chip:#453213;--shadow:#100901;--dot:rgba(255,201,60,.10);}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","BIZ UDPGothic","Yu Gothic","Meiryo",sans-serif;
background:radial-gradient(var(--dot) 2.2px,transparent 2.6px) 0 0/28px 28px,var(--cream);
color:var(--ink);line-height:1.9;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:24px 18px 64px}
header{text-align:center;padding:18px 0 4px}
header a{color:var(--ink);font-weight:800;font-size:14px;text-decoration:none;letter-spacing:.04em}
.eyebrow{text-align:center;font-size:12px;font-weight:800;color:#FFF8E8;margin-bottom:10px}
.eyebrow span{background:var(--grp);border:2px solid var(--ink);border-radius:999px;padding:3px 14px}
h1{text-align:center;font-size:clamp(26px,7vw,34px);line-height:1.35;margin-bottom:4px;text-wrap:balance}
.tagline{text-align:center;font-weight:800;color:var(--grp);font-size:14.5px;margin-bottom:10px}
.fig{width:200px;height:200px;margin:0 auto 8px;background:var(--grp-soft);border-radius:36px}
.lead{font-size:14.5px;margin-bottom:26px}
section{background:var(--card);border:3px solid var(--ink);border-radius:20px;
box-shadow:6px 6px 0 var(--shadow);padding:22px 20px;margin-bottom:22px}
h2{font-size:18px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
h2::after{content:"";flex:1;border-top:2.5px dotted var(--muted);opacity:.5}
h3{font-size:15px;margin:14px 0 6px;color:var(--grp)}
p,li{font-size:14px}
ul,ol{padding-left:1.4em;display:flex;flex-direction:column;gap:6px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:7px 8px;border-bottom:2px dotted var(--chip)}
th{color:var(--muted);font-weight:800;white-space:nowrap}
.rank-table td:nth-child(3){font-family:"Avenir Next","Futura",sans-serif;font-weight:800;white-space:nowrap}
.rank-table a{color:var(--ink);font-weight:800;text-decoration:none}
.rank-table a:hover{text-decoration:underline}
.tier{font-size:11.5px;font-weight:800;color:var(--grp)}
.bar{display:inline-block;height:10px;border-radius:999px;background:var(--sun);border:2px solid var(--ink);vertical-align:middle}
.cta{background:var(--sun);text-align:center;color:#42280E}
.cta p{font-weight:800;font-size:15px;margin-bottom:14px;color:#42280E}
.cta a{display:inline-block;font-weight:800;font-size:16px;color:#42280E;background:#FFFDF2;
border:3px solid #42280E;border-radius:16px;padding:13px 28px;text-decoration:none;
box-shadow:4px 4px 0 var(--shadow);margin:0 6px 8px}
footer{text-align:center;font-size:11px;color:var(--muted);line-height:2;margin-top:10px}
footer b{display:block;font-size:13px;color:var(--ink)}
:root{--grp:#8A6B43;--grp-soft:#8A6B4322;}
.wrap{text-align:center}
.code404{font-family:"Avenir Next","Futura",sans-serif;font-weight:800;font-size:64px;color:var(--sun-deep)}
</style>
</head>
<body>
<header><a href="/">16バナナtype診断</a></header>

</html>
